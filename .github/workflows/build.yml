name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: >
          pyinstaller
          --onefile
          --windowed
          --name DriveDuster
          driveduster.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DriveDuster-windows
          path: dist/DriveDuster.exe
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "DriveDuster ${{ github.ref_name }}"
          files: dist/DriveDuster.exe
          generate_release_notes: true
